name: Test EC2 SSH On 2222

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Verify SSH connectivity on port 2222
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 2222
          timeout: 120s
          command_timeout: 5m
          script: |
            set -eu
            echo "[1/2] SSH connection succeeded on port 2222"
            hostname
            echo "[2/2] Current ssh listeners"
            sudo ss -ltnp | grep sshd || true
