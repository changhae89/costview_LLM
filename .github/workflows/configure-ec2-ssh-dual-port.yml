name: Configure EC2 SSH Dual Port

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest

    steps:
      - name: Enable SSH on port 2222 while keeping current port
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          timeout: 120s
          command_timeout: 10m
          script: |
            set -eu

            CONFIG_FILE="/etc/ssh/sshd_config"
            BACKUP_FILE="/etc/ssh/sshd_config.bak_codex_$(date +%Y%m%d%H%M%S)"
            DROPIN_DIR="/etc/ssh/sshd_config.d"
            DROPIN_FILE="$DROPIN_DIR/99-codex-ports.conf"

            echo "[1/5] Backup sshd config"
            sudo cp "$CONFIG_FILE" "$BACKUP_FILE"

            echo "[2/5] Add a drop-in SSH port config for 80 and 2222"
            sudo mkdir -p "$DROPIN_DIR"
            sudo tee "$DROPIN_FILE" >/dev/null <<'EOF'
            Port 80
            Port 2222
            EOF

            echo "[3/5] Validate sshd config"
            sudo sshd -t -f "$CONFIG_FILE"

            echo "[4/5] Restart ssh service"
            sudo systemctl restart ssh

            echo "[5/5] Show listening SSH ports"
            sudo ss -ltnp | grep sshd || true
